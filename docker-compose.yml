services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: coachos_auth
      POSTGRES_USER: coachos_auth
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-postgres}
    ports: ["5432:5432"]
    volumes: [auth-postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachos_auth -d coachos_auth"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth-service:
    build: .
    restart: unless-stopped
    init: true
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+psycopg://coachos_auth:${AUTH_DB_PASSWORD:-postgres}@db:5432/coachos_auth
      RUN_MIGRATIONS: "true"
    ports: ["8000:8000"]
    depends_on:
      db: {condition: service_healthy}

volumes:
  auth-postgres-data:
